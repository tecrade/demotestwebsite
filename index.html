<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Page title is injected from content.json → _meta.page_title -->
  <title>Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & TOKENS ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8C97A;
      --gold-pale:   #F5EDD6;
      --gold-deep:   #8B6914;
      --white:       #FDFAF4;
      --off-white:   #F7F2E8;
      --dark:        #1A1509;
      --dark-mid:    #2E2410;
      --text:        #3A2E12;
      --text-muted:  #7A6840;

      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body:    'Jost', sans-serif;

      --transition: 0.3s ease;
      --radius:     4px;
      --shadow:     0 8px 40px rgba(140,100,20,0.12);
      --shadow-lg:  0 20px 60px rgba(140,100,20,0.2);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--ff-body);
      background: var(--white);
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Show warm placeholder colour while images load from content.json */
    img {
      display: block;
      width: 100%;
      object-fit: cover;
      background: var(--gold-pale);
    }
    a   { text-decoration: none; color: inherit; }
    ul  { list-style: none; }

    /* ─── PAGE LOADER OVERLAY ────────────────────────────────── */
    #page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s ease;
    }
    #page-loader.hidden { opacity: 0; pointer-events: none; }

    .loader-logo {
      font-family: var(--ff-display);
      font-size: 1.8rem;
      color: var(--dark);
      letter-spacing: 0.06em;
    }
    .loader-logo span { color: var(--gold); }

    .loader-bar-track {
      width: 140px;
      height: 2px;
      background: var(--gold-pale);
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--gold);
      animation: loadBar 0.8s ease forwards;
    }
    @keyframes loadBar { to { width: 100%; } }

    /* ─── ERROR BANNER ───────────────────────────────────────── */
    #content-error {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10000;
      background: #c0392b;
      color: #fff;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: var(--ff-body);
    }

    /* ─── UTILITY ────────────────────────────────────────────── */
    .container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }

    .section-label {
      font-family: var(--ff-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--dark);
    }

    .gold-line {
      display: block;
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 20px 0 32px;
    }

    .btn {
      display: inline-block;
      font-family: var(--ff-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 15px 38px;
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-gold { background: var(--gold); color: var(--dark); }
    .btn-gold:hover { background: var(--gold-deep); color: var(--white); }
    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 1.5px solid var(--gold);
    }
    .btn-outline:hover { background: var(--gold); color: var(--dark); }

    /* ─── HEADER ─────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(253,250,244,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      transition: var(--transition);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }
    .logo-main {
      font-family: var(--ff-display);
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .logo-main span { color: var(--gold); }
    .logo-sub {
      font-family: var(--ff-body);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    nav { display: flex; align-items: center; gap: 36px; }
    nav a {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      position: relative;
      padding-bottom: 3px;
      transition: color var(--transition);
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1.5px;
      background: var(--gold);
      transition: width var(--transition);
    }
    nav a:hover { color: var(--gold); }
    nav a:hover::after { width: 100%; }
    .nav-cta {
      font-size: 11px !important;
      font-weight: 600 !important;
      letter-spacing: 0.14em !important;
      background: var(--gold);
      color: var(--dark) !important;
      padding: 10px 22px !important;
      transition: background var(--transition) !important;
    }
    .nav-cta:hover { background: var(--gold-deep) !important; color: var(--white) !important; }
    .nav-cta::after { display: none !important; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--dark);
      transition: var(--transition);
    }
    .mobile-nav {
      display: none;
      flex-direction: column;
      background: var(--white);
      border-top: 1px solid rgba(201,168,76,0.2);
    }
    .mobile-nav a {
      padding: 15px 24px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid var(--off-white);
      transition: background var(--transition);
    }
    .mobile-nav a:hover { background: var(--gold-pale); color: var(--gold-deep); }
    .mobile-nav.open { display: flex; }

    /* ─── HERO ───────────────────────────────────────────────── */
    #hero {
      margin-top: 70px;
      position: relative;
      height: calc(100vh - 70px);
      min-height: 520px;
      overflow: hidden;
    }
    .hero-img {
      position: absolute;
      inset: 0;
      height: 100%;
    }
    .hero-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(26,21,9,0.72) 0%,
        rgba(26,21,9,0.38) 55%,
        rgba(26,21,9,0.15) 100%
      );
    }
    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 8vw;
      max-width: 680px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .hero-badge span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold-light);
    }
    .hero-badge::before,
    .hero-badge::after {
      content: '';
      display: block;
      width: 30px; height: 1px;
      background: var(--gold);
    }
    .hero-title {
      font-family: var(--ff-display);
      font-size: clamp(2.6rem, 6vw, 4.6rem);
      font-weight: 400;
      line-height: 1.08;
      color: var(--white);
      margin-bottom: 20px;
    }
    .hero-title em { font-style: italic; color: var(--gold-light); }
    .hero-subtitle {
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgba(253,250,244,0.82);
      max-width: 440px;
      margin-bottom: 40px;
      line-height: 1.75;
    }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }

    /* ─── ABOUT ──────────────────────────────────────────────── */
    #about { padding: 100px 0; background: var(--off-white); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .about-img-wrap { position: relative; }
    .about-img-wrap img { height: 520px; border-radius: var(--radius); }
    .about-img-accent {
      position: absolute;
      bottom: -24px; right: -24px;
      width: 60%; height: 60%;
      border: 3px solid var(--gold);
      border-radius: var(--radius);
      z-index: -1;
    }
    .about-stat {
      position: absolute;
      bottom: 32px; left: -32px;
      background: var(--dark);
      color: var(--white);
      padding: 22px 28px;
      min-width: 140px;
    }
    .about-stat-num {
      font-family: var(--ff-display);
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--gold-light);
      line-height: 1;
    }
    .about-stat-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(253,250,244,0.7);
      margin-top: 4px;
    }
    .about-text {
      font-size: 15.5px;
      line-height: 1.9;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .about-pillars { display: flex; gap: 32px; margin-top: 36px; }
    .about-pillar { display: flex; flex-direction: column; gap: 6px; }
    .about-pillar-icon { font-size: 1.4rem; margin-bottom: 4px; }
    .about-pillar-title { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--dark); }
    .about-pillar-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    /* ─── COLLECTIONS ────────────────────────────────────────── */
    #collections { padding: 100px 0; background: var(--white); }
    .collections-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 56px;
      gap: 20px;
      flex-wrap: wrap;
    }
    .collections-head .gold-line { margin-bottom: 0; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px;
    }
    .card {
      background: var(--white);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .card-img-wrap { position: relative; overflow: hidden; }
    .card-img-wrap img { height: 240px; transition: transform 0.5s ease; }
    .card:hover .card-img-wrap img { transform: scale(1.05); }
    .card-badge {
      position: absolute;
      top: 14px; left: 14px;
      background: var(--gold);
      color: var(--dark);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 11px;
    }
    .card-body { padding: 22px 20px 26px; }
    .card-category {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .card-name {
      font-family: var(--ff-display);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-price {
      font-family: var(--ff-display);
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--gold-deep);
    }
    .card-btn {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 8px 16px;
      transition: var(--transition);
      background: transparent;
      cursor: pointer;
    }
    .card-btn:hover { background: var(--gold); color: var(--dark); }

    /* ─── OFFER BANNER ───────────────────────────────────────── */
    #offer { position: relative; overflow: hidden; padding: 90px 0; }
    #offer .offer-bg { position: absolute; inset: 0; height: 100%; }
    #offer .offer-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(26,21,9,0.88) 0%, rgba(26,21,9,0.65) 60%, rgba(26,21,9,0.3) 100%);
    }
    .offer-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }
    .offer-left { max-width: 560px; }
    .offer-tag {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 6px 16px;
      margin-bottom: 20px;
    }
    .offer-title {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .offer-title em { font-style: italic; color: var(--gold-light); }
    .offer-text {
      font-size: 15px;
      color: rgba(253,250,244,0.8);
      line-height: 1.75;
      margin-bottom: 32px;
    }
    .offer-timer { display: flex; gap: 20px; margin-top: 32px; flex-wrap: wrap; }
    .timer-unit { text-align: center; min-width: 64px; }
    .timer-num {
      font-family: var(--ff-display);
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--gold-light);
      line-height: 1;
    }
    .timer-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(253,250,244,0.6);
      margin-top: 4px;
    }
    .timer-sep {
      font-family: var(--ff-display);
      font-size: 2rem;
      color: var(--gold);
      align-self: flex-start;
      padding-top: 2px;
    }
    .offer-discount {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 160px; height: 160px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: rgba(201,168,76,0.08);
    }
    .offer-pct {
      font-family: var(--ff-display);
      font-size: 3rem;
      font-weight: 600;
      color: var(--gold-light);
      line-height: 1;
    }
    .offer-off {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(253,250,244,0.75);
    }

    /* ─── TESTIMONIALS ───────────────────────────────────────── */
    #testimonials { padding: 100px 0; background: var(--off-white); }
    .testimonials-head { text-align: center; margin-bottom: 64px; }
    .testimonials-head .gold-line { margin: 20px auto 0; }
    .testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
    .testi-card {
      background: var(--white);
      padding: 36px 32px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border-top: 3px solid var(--gold);
      transition: transform var(--transition);
    }
    .testi-card:hover { transform: translateY(-4px); }
    .testi-quote {
      font-family: var(--ff-display);
      font-size: 3.5rem;
      color: var(--gold-pale);
      line-height: 0.6;
      margin-bottom: 16px;
    }
    .testi-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-muted);
      font-style: italic;
      font-family: var(--ff-display);
      margin-bottom: 28px;
    }
    .testi-stars { color: var(--gold); font-size: 14px; letter-spacing: 3px; margin-bottom: 18px; }
    .testi-author { display: flex; align-items: center; gap: 14px; }
    .testi-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--gold-pale);
    }
    .testi-avatar img { height: 44px; }
    .testi-name { font-size: 13px; font-weight: 600; color: var(--dark); letter-spacing: 0.06em; }
    .testi-location { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }

    /* ─── CONTACT ────────────────────────────────────────────── */
    #contact { padding: 100px 0; background: var(--white); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .contact-info { padding-right: 20px; }
    .contact-detail { display: flex; gap: 18px; align-items: flex-start; margin-bottom: 28px; }
    .contact-icon {
      width: 44px; height: 44px;
      background: var(--gold-pale);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .contact-detail-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .contact-detail-value { font-size: 15px; color: var(--text); font-weight: 400; }
    .contact-detail-value a { color: var(--text); transition: color var(--transition); }
    .contact-detail-value a:hover { color: var(--gold); }
    .contact-form-wrap {
      background: var(--off-white);
      padding: 44px;
      border-radius: var(--radius);
    }
    .form-title {
      font-family: var(--ff-display);
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 28px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .form-group input,
    .form-group textarea {
      font-family: var(--ff-body);
      font-size: 14px;
      background: var(--white);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 13px 16px;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition);
      border-radius: var(--radius);
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--gold); }
    .form-group textarea { resize: vertical; min-height: 100px; }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    #footer { background: var(--dark); color: var(--white); padding: 70px 0 32px; }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 56px;
    }
    .footer-brand .logo-main { font-size: 1.5rem; color: var(--white); }
    .footer-brand .logo-sub  { color: rgba(253,250,244,0.4); }
    .footer-tagline {
      font-size: 13.5px;
      color: rgba(253,250,244,0.55);
      line-height: 1.75;
      margin: 18px 0 24px;
      max-width: 260px;
    }
    .social-links { display: flex; gap: 12px; }
    .social-link {
      width: 38px; height: 38px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      color: rgba(253,250,244,0.6);
      transition: var(--transition);
    }
    .social-link:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    .footer-col-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 22px;
    }
    .footer-col ul { display: flex; flex-direction: column; gap: 12px; }
    .footer-col ul li a { font-size: 13.5px; color: rgba(253,250,244,0.55); transition: color var(--transition); }
    .footer-col ul li a:hover { color: var(--gold-light); }
    .footer-bottom {
      border-top: 1px solid rgba(201,168,76,0.15);
      padding-top: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-copy { font-size: 12.5px; color: rgba(253,250,244,0.38); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: 12px; color: rgba(253,250,244,0.38); transition: color var(--transition); }
    .footer-links a:hover { color: var(--gold); }

    /* ─── SCROLL REVEAL ──────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ─── EDITABLE HOVER (visual editor hint) ────────────────── */
    [data-editable="true"]:hover {
      outline: 2px dashed rgba(201,168,76,0.55);
      outline-offset: 3px;
      cursor: pointer;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 860px) {
      nav { display: none; }
      .hamburger { display: flex; }
      .about-grid,
      .contact-grid { grid-template-columns: 1fr; gap: 48px; }
      .about-img-accent { display: none; }
      .about-stat { left: 16px; bottom: 16px; }
      .testi-grid { grid-template-columns: 1fr; }
      .offer-discount { display: none; }
    }
    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; gap: 36px; }
      .footer-bottom { flex-direction: column; align-items: flex-start; }
      .hero-content { padding: 0 24px; }
      .about-pillars { flex-direction: column; gap: 20px; }
      .contact-form-wrap { padding: 28px 20px; }
      #about, #collections, #testimonials, #contact { padding: 68px 0; }
    }
  </style>

  <!-- ════════════════════════════════════════════
       CONTENT LOADER
       Fetches content.json, then maps every entry
       to its matching [data-id] element.
       ════════════════════════════════════════════ -->
  <script>
    /* ─────────────────────────────────────────────
       applyContent(content)
       Walks every [data-editable] element and fills
       it with the matching entry from content.json.

       Dispatch rules by data-type:
         "image"  → sets img.src and img.alt
         "link"   → sets a.href, then text/html label
         "text"   → sets innerHTML (if "html" key)
                    or textContent (if "value" key)
    ───────────────────────────────────────────── */
    function applyContent(content) {
      document.querySelectorAll('[data-editable="true"]').forEach(el => {
        const id   = el.dataset.id;
        const type = el.dataset.type;
        const item = content[id];

        // Skip separator keys and missing entries
        if (!item || typeof item !== 'object' || !item.type) return;

        if (type === 'image') {
          if (item.src) el.src = item.src;
          if (item.alt) el.alt = item.alt;

        } else if (type === 'link') {
          if (item.href) el.setAttribute('href', item.href);
          // Link label: prefer html (rich text), fall back to plain text
          if (item.html)      el.innerHTML   = item.html;
          else if (item.text) el.textContent = item.text;

        } else {
          // type === 'text'
          if (item.html)       el.innerHTML   = item.html;
          else if (item.value) el.textContent = item.value;
        }
      });

      // Apply page title from _meta
      if (content._meta && content._meta.page_title) {
        document.title = content._meta.page_title;
      }
    }

    /* ─────────────────────────────────────────────
       Boot: fetch → apply → reveal page
    ───────────────────────────────────────────── */
    async function boot() {
      const loader = document.getElementById('page-loader');
      const errBanner = document.getElementById('content-error');

      try {
        const res = await fetch('content.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const content = await res.json();

        applyContent(content);

        // Dismiss loader
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 450);

      } catch (err) {
        console.error('[ContentLoader] Failed to load content.json:', err);
        errBanner.style.display = 'block';
        // Still dismiss loader so the skeleton is visible
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 450);
      }
    }

    // Run immediately (DOM is ready since script is at bottom)
    boot();

    /* ─────────────────────────────────────────────
       UI BEHAVIOURS (independent of content)
    ───────────────────────────────────────────── */

    // Mobile nav toggle
    const hamburger = document.getElementById('hamburgerBtn');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', () => mobileNav.classList.toggle('open'));
    mobileNav.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => mobileNav.classList.remove('open'));
    });
    document.addEventListener('click', e => {
      if (!hamburger.contains(e.target) && !mobileNav.contains(e.target)) {
        mobileNav.classList.remove('open');
      }
    });

    // Sticky header shadow
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      header.style.boxShadow = window.scrollY > 10
        ? '0 4px 24px rgba(140,100,20,0.10)'
        : 'none';
    }, { passive: true });

    // Scroll reveal
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          entry.target.style.transitionDelay = (i % 4) * 0.1 + 's';
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // Countdown timer (counts down from now + ~12 days)
    const targetDate = new Date(Date.now() + 12 * 864e5 + 8 * 36e5 + 34 * 6e4);

    function updateTimer() {
      const diff = Math.max(0, targetDate - Date.now());
      const pad  = n => String(n).padStart(2, '0');
      document.getElementById('timer-days').textContent  = pad(Math.floor(diff / 864e5));
      document.getElementById('timer-hours').textContent = pad(Math.floor((diff % 864e5) / 36e5));
      document.getElementById('timer-mins').textContent  = pad(Math.floor((diff % 36e5) / 6e4));
      document.getElementById('timer-secs').textContent  = pad(Math.floor((diff % 6e4) / 1e3));
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    // Contact form submit feedback
    function handleFormSubmit(e) {
      e.preventDefault();
      const btn = e.currentTarget;
      const orig = btn.textContent;
      btn.textContent = 'Message Sent! ✦';
      btn.style.cssText = 'background:var(--gold-deep);color:#fff;width:100%;';
      setTimeout(() => {
        btn.textContent = orig;
        btn.style.cssText = 'width:100%;';
        ['cf-name','cf-email','cf-phone','cf-msg'].forEach(id => {
          document.getElementById(id).value = '';
        });
      }, 3000);
    }
  </script>

</body>
